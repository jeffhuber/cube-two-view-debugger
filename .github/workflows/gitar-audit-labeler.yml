# Gitar audit labeler
#
# Gitar (https://gitar.ai) is an AI code-review GitHub App. UNLIKE the
# Greptile labeler (which fires on pull_request_review events), Gitar
# posts a single ISSUE COMMENT — a "dashboard" comment whose Code Review
# verdict is an HTML <kbd> badge (e.g. <kbd>✅ Approved</kbd>). So this
# labeler fires on issue_comment events from the Gitar bot, parses that
# badge, and applies one of `gitar-audit-{done,blocked}` (or
# `needs-gitar-audit` when the badge is present but unparseable).
#
# This lane is INFORMATIONAL ONLY (like Greptile): it never gates merge.
# Gitar's review is free and auto-runs on every PR, so the lane is
# act-on-all (no opt-in label needed) and there is NO clear-stale-on-push
# job — a momentarily stale informational label is harmless, and Gitar
# re-reviews on every push (the labeler also fires on `edited`).
#
# Bot identity: the labeler's `is_gitar_comment_author()` reads the
# `GITAR_BOT_AUTHORS` repo variable (comma-separated). Default accepts
# `gitar-bot` / `gitar-bot[bot]` / `gitar-ai[bot]`. The gate is enforced
# in Python (not in YAML by github.actor) so the override actually works.
#
# If GitHub's built-in token cannot label the bot's comments, configure
# GITAR_AUDIT_LABEL_TOKEN as a fine-grained token with:
#   - Issues: read + write   (apply/remove labels)

name: Gitar audit labeler

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # If Gitar edits its dashboard comment again (e.g. on a new push) while
    # an earlier run is still in flight, cancel the earlier run so a stale
    # verdict snapshot can't overwrite a newer label. Group by PR AND
    # comment author so ONLY Gitar's own successive verdict edits cancel
    # each other; an unrelated user/bot comment on the same PR is a
    # different group and won't cancel an in-flight Gitar-verdict run
    # (Codex P2 on cube-snap#271 — keying by PR alone dropped the label).
    # Informational lane, so this is belt-and-suspenders, not a merge gate.
    concurrency:
      group: gitar-audit-labeler-${{ github.event.issue.number }}-${{ github.event.comment.user.login }}
      cancel-in-progress: true
    steps:
      - name: Check out labeler code from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Apply Gitar audit labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITAR_AUDIT_LABEL_TOKEN || github.token }}
          GITAR_BOT_AUTHORS: ${{ vars.GITAR_BOT_AUTHORS }}
        run: |
          # Bootstrap guard: the workflow checks out the default branch,
          # so on the bootstrap PR that ADDS this workflow + labeler,
          # `tools/gitar_audit_labeler.py` does not exist on `main` yet.
          # Skip gracefully rather than failing the run (Devin caught the
          # analogous case on the Greptile bootstrap, cube-snap #145).
          if [ ! -f tools/gitar_audit_labeler.py ]; then
            echo "tools/gitar_audit_labeler.py not present on default branch — bootstrap PR; skipping"
            exit 0
          fi
          python3 tools/gitar_audit_labeler.py
