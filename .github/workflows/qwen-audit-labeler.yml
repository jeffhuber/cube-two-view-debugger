# Qwen audit labeler
#
# Mirrors the Devin labeler workflow for the parallel Qwen calibration
# phase. Triggered by every PR-comment event, but the Python step is
# authoritative about which authors are trusted: `tools/qwen_audit_labeler.py`
# checks `QWEN_BOT_AUTHORS` (default: `qwen-audit-bot,qwen-audit-bot[bot]`)
# and silently no-ops for anyone else. Workflow-level filtering was removed
# in PR #231 so that `QWEN_BOT_AUTHORS=jeffhuber` style early-calibration
# overrides actually take effect — previously the YAML-level `if:` gate
# would skip the job entirely before the Python step's env var was read.
#
# The script parses the `<!-- QWEN_AUDIT_STATE: ... -->` trailer in trusted
# authors' comments and applies one of the `qwen-audit-{done,blocked,needs}`
# labels.
#
# If GitHub's built-in token cannot label the bot's comments, configure
# QWEN_AUDIT_LABEL_TOKEN as a fine-grained token with Issues read/write
# access.

name: Qwen audit labeler

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  label:
    # No YAML-level actor gate by design — see the Python step for the
    # authoritative QWEN_BOT_AUTHORS check. This workflow is cheap (under
    # 10 seconds per run) and fires on issue_comment events, which is
    # low volume in this repo.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out labeler code from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Apply Qwen audit labels
        env:
          GITHUB_TOKEN: ${{ secrets.QWEN_AUDIT_LABEL_TOKEN || github.token }}
          QWEN_BOT_AUTHORS: ${{ vars.QWEN_BOT_AUTHORS }}
        run: python3 tools/qwen_audit_labeler.py
