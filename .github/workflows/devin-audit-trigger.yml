# Devin audit trigger
#
# Bridges the gap between GitHub's native webhook auth (HMAC via
# `X-Hub-Signature-256`) and Devin's custom webhook auth
# (`x-webhook-secret` header). Without this bridge, Devin's native
# webhook integration cannot consume GitHub events directly:
# deliveries return `401 {"detail":"Missing webhook secret"}`.
#
# When a PR gets the `needs-devin-audit` label, this workflow forwards
# the GitHub PR event payload verbatim to Devin's webhook endpoint,
# adding the `x-webhook-secret` header Devin expects. Devin's handler
# can be the same code it would use if GitHub's native webhook had
# worked — the payload shape is identical.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DEVIN_WEBHOOK_URL    The Custom Webhook URL Devin gives you.
#   DEVIN_WEBHOOK_SECRET The webhook secret Devin issued for that URL.
#
# To trigger an audit, add the `needs-devin-audit` label to any PR.
# To re-trigger, remove and re-add the label.
#
# Devin sets `devin-audit-done` or `devin-audit-blocked` after the
# audit completes; those labels are not consumed by this workflow.

name: Devin audit trigger

on:
  pull_request:
    types: [labeled]

permissions:
  # Read-only — we only forward the payload; Devin does the actual
  # PR work via its own auth.
  pull-requests: read
  contents: read

jobs:
  forward-to-devin:
    if: github.event.label.name == 'needs-devin-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Forward webhook payload to Devin
        env:
          DEVIN_WEBHOOK_URL: ${{ secrets.DEVIN_WEBHOOK_URL }}
          DEVIN_WEBHOOK_SECRET: ${{ secrets.DEVIN_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${DEVIN_WEBHOOK_URL:-}" ]; then
            echo "::error::DEVIN_WEBHOOK_URL repo secret is not configured."
            exit 1
          fi
          if [ -z "${DEVIN_WEBHOOK_SECRET:-}" ]; then
            echo "::error::DEVIN_WEBHOOK_SECRET repo secret is not configured."
            exit 1
          fi

          # Forward the GitHub event JSON verbatim. Devin's handler
          # sees the same shape it would from a native GitHub→Devin
          # webhook integration; the only delta is the auth header.
          payload_file="$GITHUB_EVENT_PATH"

          # Compose a deterministic delivery id so Devin can dedupe
          # if a retry fires the same label transition twice.
          delivery_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          http_status=$(curl --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-GitHub-Event: pull_request" \
            --header "X-GitHub-Delivery: ${delivery_id}" \
            --header "User-Agent: github-actions-devin-audit-trigger" \
            --header "x-webhook-secret: ${DEVIN_WEBHOOK_SECRET}" \
            --data-binary "@${payload_file}" \
            --output /tmp/devin-response.txt \
            --write-out "%{http_code}" \
            "${DEVIN_WEBHOOK_URL}")

          echo "Devin webhook response: HTTP ${http_status}"
          echo "--- response body ---"
          cat /tmp/devin-response.txt || true
          echo "--- end response body ---"

          # Treat any non-2xx as a workflow failure so the user sees a
          # red check on the PR. Devin's handler should return 2xx on
          # both "I accepted the audit request" and "I deduped, no-op"
          # outcomes; anything else (4xx/5xx) means real failure.
          if [ "${http_status}" -lt 200 ] || [ "${http_status}" -ge 300 ]; then
            echo "::error::Devin webhook returned non-2xx status (${http_status}); see response body above."
            exit 1
          fi
