# Qwen audit labeler
#
# Mirrors the Devin labeler workflow for the parallel Qwen calibration
# phase. Triggered by comments from the Qwen audit bot account, parses
# the `<!-- QWEN_AUDIT_STATE: ... -->` trailer, and applies one of the
# `qwen-audit-{done,blocked,needs}` labels.
#
# Bot identity: by default the labeler accepts comments from any login
# named `qwen-audit-bot` or `qwen-audit-bot[bot]`. To use a different
# service account, set the QWEN_BOT_AUTHORS repo variable (comma-
# separated list) — the labeler script reads it via env. The `if`
# condition below should be updated to match the same account(s).
#
# If GitHub's built-in token cannot label the bot's comments, configure
# QWEN_AUDIT_LABEL_TOKEN as a fine-grained token with Issues read/write
# access.

name: Qwen audit labeler

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  label:
    if: github.actor == 'qwen-audit-bot' || github.actor == 'qwen-audit-bot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out labeler code from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Apply Qwen audit labels
        env:
          GITHUB_TOKEN: ${{ secrets.QWEN_AUDIT_LABEL_TOKEN || github.token }}
          QWEN_BOT_AUTHORS: ${{ vars.QWEN_BOT_AUTHORS }}
        run: python3 tools/qwen_audit_labeler.py
