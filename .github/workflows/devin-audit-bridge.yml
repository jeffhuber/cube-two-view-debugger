# Devin audit bridge
#
# GitHub's direct webhook cannot send Devin's required `x-webhook-secret`
# header, so this workflow acts as a tiny metadata-only bridge. It never
# checks out or runs pull request code.
#
# Required repo secrets:
#   DEVIN_WEBHOOK_URL     Custom Webhook URL from Devin
#   DEVIN_WEBHOOK_SECRET  Secret Devin expects in the x-webhook-secret header
# Optional repo secrets for repo-scoped session creation:
#   DEVIN_API_TOKEN       Devin API token with ManageOrgSessions permission
#   DEVIN_ORG_ID          Devin organization ID

name: Devin audit bridge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  issue_comment:
    types: [created]
  # Watchdog: periodically re-scan open PRs with needs-devin-audit so a
  # missed webhook/session wakeup does not leave Claude/Codex waiting.
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dispatch:
    if: >
      github.actor != 'devin-ai-integration[bot]' &&
      github.actor != 'vercel[bot]' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request_target' &&
          (
            (
              github.event.action == 'labeled' &&
              github.event.label.name == 'needs-devin-audit'
            ) ||
            (
              github.event.action != 'labeled' &&
              contains(github.event.pull_request.labels.*.name, 'needs-devin-audit')
            )
          )
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '@devin audit') &&
          (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out bridge code from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Dispatch Devin audit request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_ACTION: ${{ github.event.action }}
          DEVIN_WEBHOOK_URL: ${{ secrets.DEVIN_WEBHOOK_URL }}
          DEVIN_WEBHOOK_SECRET: ${{ secrets.DEVIN_WEBHOOK_SECRET }}
          DEVIN_API_TOKEN: ${{ secrets.DEVIN_API_TOKEN }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          DEVIN_PLAYBOOK_ID: playbook-1fb021b63ce24f9ab6d38341f77c5453
        run: python tools/devin_audit_bridge.py
