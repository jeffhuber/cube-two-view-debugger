# Codex audit labeler
#
# Mirrors the Devin/Qwen labeler workflows for the parallel Codex
# calibration phase. Triggered by comments from the Codex audit bot
# account, parses the `<!-- CODEX_AUDIT_STATE: ... -->` trailer, and
# applies one of the `codex-audit-{done,blocked,needs}` labels.
#
# Bot identity: the labeler script's `is_codex_comment_author()` reads
# the `CODEX_BOT_AUTHORS` repo variable (comma-separated). Default
# accepts logins `codex-audit-bot` or `codex-audit-bot[bot]`. Per the
# Qwen #231 review fix, this workflow does NOT gate by `github.actor`
# in the YAML — that gate is enforced in Python so the
# `CODEX_BOT_AUTHORS` override actually works for early calibration
# (e.g., posting comments under the user's personal login).
#
# If GitHub's built-in token cannot label the bot's comments, configure
# CODEX_AUDIT_LABEL_TOKEN as a fine-grained token with BOTH:
#   - Issues: read + write   (to apply/remove labels)
#   - Pull requests: read    (the labeler's main() reads PR head SHA
#                             via GET /repos/{repo}/pulls/{n} for the
#                             stale-SHA detection)
# Codex round 5 of #234 — P2: an Issues-only token would fail the
# /pulls/{n} fetch before any label is applied.
#
# Push handling (cube-snap#205 / ctvd#371): the labeler also runs on
# `pull_request_target.synchronize` to clear stale `codex-audit-done` /
# `codex-audit-blocked` labels that no longer correspond to the new
# head. Without this, a PR audited at SHA A could carry `codex-audit-done`
# indefinitely after a push to SHA B, falsely authorizing the standing
# in-thread merge delegation on an unaudited head. `needs-codex-audit`
# is NOT auto-applied on push — operators re-fire
# `tools/run_codex_audit_pr.sh` manually when ready, matching the
# established Codex-lane protocol.

name: Codex audit labeler

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  label:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out labeler code from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Apply Codex audit labels
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CODEX_AUDIT_LABEL_TOKEN: ${{ secrets.CODEX_AUDIT_LABEL_TOKEN }}
          CODEX_BOT_AUTHORS: ${{ vars.CODEX_BOT_AUTHORS }}
        run: python3 tools/codex_audit_labeler.py

  clear-stale-on-push:
    # Clear stale Codex audit labels when the PR head moves. Both the
    # standing in-thread merge delegation and the captured-PASS-via-dump
    # escape hatch trust these labels as head-bound signals; without
    # this handler a stale label survives across pushes and could
    # authorize merging an unaudited newer head. Codex P1 on round 2 of
    # cube-snap#205 / ctvd#371.
    #
    # SECURITY NOTE: this job uses `pull_request_target` (not
    # `pull_request`) so it receives a write-capable `github.token`
    # even when the push comes from a fork. Without that, fork-pushed
    # PRs would silently leave stale audit labels intact because the
    # default `pull_request` token from a fork is read-only and gets no
    # secrets (Codex P1 on round 3 of cube-snap#205 / ctvd#371).
    # `pull_request_target` runs in the base repo context with elevated
    # permissions, so the job MUST NOT check out PR-controlled code (no
    # `actions/checkout` step) — otherwise a malicious fork could
    # execute arbitrary code with our write token. This job operates
    # only on event metadata + GitHub API calls; PR code is never read.
    #
    # Token: github.token directly. The workflow-level `issues: write`
    # permission gives github.token the scope it needs. The earlier
    # `secrets.CODEX_AUDIT_LABEL_TOKEN || github.token` pattern would
    # silently fail if the optional PAT was configured but broken
    # (expired, missing Issues:write, etc.) — github-script would use
    # the broken PAT and never retry with github.token (Codex P2 on
    # round 3 of the same PR pair). Unlike the Python labeler script
    # (which has its own retry chain for the issue_comment trigger),
    # this synchronize handler is simple enough that using github.token
    # directly is both safer and more reliable.
    if: github.event_name == 'pull_request_target' && github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Cancel superseded sync runs for the same PR (Codex P2 round 4 of
    # cube-snap#205). If multiple pushes queue close together, the
    # earlier runs hold a stale event-payload SHA; cancelling them
    # when a newer run starts means only the latest run touches
    # labels. The runtime refetch below ALSO guards against stale
    # payloads in case cancellation races (defense in depth).
    concurrency:
      group: codex-audit-labeler-sync-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Clear stale Codex audit labels on push
        uses: actions/github-script@v7
        env:
          CODEX_BOT_AUTHORS: ${{ vars.CODEX_BOT_AUTHORS }}
        with:
          script: |
            const pr_number = context.payload.pull_request.number;

            // Refetch live PR head (Codex P2 round 4 of cube-snap#205).
            // Event-payload `pull_request.head.sha` can be stale if
            // multiple pushes queue up and this run is processed out
            // of order; only the actual current head is safe to
            // compare against the latest audit comment.
            const prResp = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
            });
            const currentHead = prResp.data.head.sha.toLowerCase();

            // Mirror the Python labeler's author normalization (Codex
            // P2 round 4 of ctvd#371). CODEX_BOT_AUTHORS is an
            // OVERRIDE (not additive) when set; entries are stripped
            // and lowercased; comparison is against lowercased login.
            // See `_DEFAULT_AUTHORS` / `CODEX_COMMENT_AUTHORS` in
            // tools/codex_audit_labeler.py — this block must stay in
            // sync with that semantics or the two workflows can
            // disagree on which comments count as authoritative.
            const DEFAULT_AUTHORS = 'codex-audit-bot,codex-audit-bot[bot]';
            const botLogins = new Set(
              (process.env.CODEX_BOT_AUTHORS || DEFAULT_AUTHORS)
                .split(',')
                .map(s => s.trim().toLowerCase())
                .filter(Boolean)
            );

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                per_page: 100,
              }
            );
            // Audit-comment classifier — mirrors Python's
            // `classify_audit_comment` in tools/codex_audit_labeler.py.
            // Returns "done" | "blocked" | "needs" | null. Last trailer
            // wins over prose fallback (which itself wins over no
            // signal). This block MUST stay in sync with the Python
            // version: the issue_comment labeler and this synchronize
            // handler classify the same comment differently otherwise,
            // and the synchronize handler can delete a label that the
            // labeler validly applied (Codex P2 round 7 of
            // cube-snap#205 / ctvd#371 caught the previous
            // trailer-only filter).
            function classifyAuditComment(body) {
              const trailerAll = [
                ...body.matchAll(/<!--\s*CODEX_AUDIT_STATE:\s*([\w-]+)\s*-->/gi),
              ];
              if (trailerAll.length > 0) {
                const tag = trailerAll[trailerAll.length - 1][1].toLowerCase();
                if (tag === 'codex-audit-done') return 'done';
                if (tag === 'codex-audit-blocked') return 'blocked';
                return 'needs';
              }
              // Prose fallbacks (less reliable; only used if trailer
              // was missed). Matches `Codex Audit [—–:-] PASS` or
              // `Codex Audit Result [—–:-] BLOCKED/BLOCKER/INCOMPLETE`.
              //
              // Prose-fallback candidates ALSO require a parseable
              // `Head SHA:` (Codex P2 round 1 of cube-snap#206 /
              // ctvd#373). The Python labeler's resolve_label_decision
              // refuses to apply a label when reviewed_sha is missing,
              // so a no-SHA "Codex Audit: PASS" comment never produced
              // a real label there — without this guard, the
              // synchronize handler would over-trust such a comment
              // (treat it as the latest audit and use its missing SHA
              // to mark labels stale), erasing labels validly applied
              // by an earlier real audit.
              if (!/Head SHA:\s*`[0-9a-fA-F]{7,40}`/.test(body)) {
                return null;
              }
              if (/Codex Audit(?:\s+Result)?\s*[—–:-]\s*PASS\b/i.test(body)) {
                return 'done';
              }
              if (/Codex Audit(?:\s+Result)?\s*[—–:-]\s*(BLOCKED|BLOCKER|INCOMPLETE)\b/i.test(body)) {
                return 'blocked';
              }
              return null;
            }

            const audits = comments
              // Optional chaining on `c.user` (Codex P2 round 6 of
              // ctvd#371): GitHub returns `user: null` for comments
              // whose author has been deleted, and `c.user.login`
              // would throw mid-filter. Without this guard, a single
              // deleted-author comment in the PR's history makes the
              // entire stale-label cleanup fail and leaves any prior
              // codex-audit-done in place after a push — exactly the
              // failure mode this handler is meant to close.
              .filter(c => botLogins.has((c.user?.login || '').toLowerCase()))
              // Use the same classifier the Python labeler uses for
              // applying labels (Codex P2 round 7). The previous
              // trailer-only filter would skip comments classified
              // via prose fallback, so a prose-classified PASS/BLOCKED
              // for the current head wouldn't suppress this handler's
              // removal step and the valid label could be erased.
              .filter(c => classifyAuditComment(c.body) !== null)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Trailer-aware preservation (Codex P1 round 4 of ctvd#371).
            // Previously preserved ANY audit label when the latest
            // comment SHA matched current head, but a stale
            // codex-audit-done from earlier head + latest comment for
            // current head as BLOCKED would let the stale PASS survive
            // and falsely authorize a merge. Use the classifier and
            // preserve only the label that matches its verdict.
            const stale_labels = new Set(['codex-audit-done', 'codex-audit-blocked']);
            if (audits.length > 0) {
              const latest = audits[0];
              const shaM = latest.body.match(/Head SHA:\s*`([0-9a-fA-F]{7,40})`/);
              const verdict = classifyAuditComment(latest.body);
              if (shaM && verdict) {
                const reviewed = shaM[1].toLowerCase();
                const headMatches = currentHead === reviewed || currentHead.startsWith(reviewed);
                if (headMatches) {
                  // `needs` verdict = audit didn't complete; treat as
                  // no fresh audit and remove both audit-* labels.
                  const preserve = (
                    verdict === 'done' ? 'codex-audit-done' :
                    verdict === 'blocked' ? 'codex-audit-blocked' :
                    null
                  );
                  if (preserve) {
                    stale_labels.delete(preserve);
                    core.info(
                      `Latest audit comment (id=${latest.id}) for current head ${currentHead} classified as ${verdict}; preserving ${preserve}, removing the opposing audit label.`
                    );
                  } else {
                    core.info(
                      `Latest audit comment (id=${latest.id}) for current head ${currentHead} classified as ${verdict}; removing all audit labels.`
                    );
                  }
                }
              }
            }

            for (const name of stale_labels) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr_number,
                  name: name,
                });
                core.info(`Removed stale label ${name} from PR #${pr_number}`);
              } catch (e) {
                // 404 = label was not applied; that is the normal case.
                if (e.status !== 404) throw e;
              }
            }
